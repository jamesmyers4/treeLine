name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser (chromium)
        run: pnpm --filter @treeline/acquire exec playwright install --with-deps chromium

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build packages
        run: |
          pnpm --filter @treeline/acquire build && \
          pnpm --filter @treeline/core build && \
          pnpm --filter @treeline/interpret build && \
          pnpm --filter @treeline/output build && \
          pnpm --filter @treeline/pages build && \
          pnpm --filter @treeline/cli build && \
          pnpm --filter @treeline/verify build

      - name: Run tests
        run: xvfb-run -a pnpm -r test
